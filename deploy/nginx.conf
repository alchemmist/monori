server {
    listen 8000;
    server_name _;
    absolute_redirect off;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://back:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # bank syncs drive a real browser; the proxy must outlive a full login
        proxy_read_timeout 600s;
    }

    location = /api-docs {
        proxy_pass http://back:8000;
    }

    location = /api-redoc {
        proxy_pass http://back:8000;
    }

    location = /openapi.json {
        proxy_pass http://back:8000;
    }

    location /assets/ {
        root /srv/app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # one SPA serves the app, the landing (/welcome) and the docs (/docs/*):
    # unknown paths fall through to index.html and the client router renders them
    location / {
        root /srv/app;
        try_files $uri /index.html;
    }
}
