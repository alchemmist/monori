repos:
    - repo: local
      hooks:
          - id: fmt-check
            name: fmt-check
            entry: make fmt-check
            language: system
            pass_filenames: false
            always_run: true
          - id: lint
            name: lint
            entry: make lint
            language: system
            pass_filenames: false
            always_run: true
          - id: typecheck
            name: typecheck
            entry: make typecheck
            language: system
            pass_filenames: false
            always_run: true
          - id: t-fast
            name: t-fast
            entry: make t-fast
            language: system
            pass_filenames: false
            always_run: true
