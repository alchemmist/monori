name: Deploy

# Rolls out a release on every push to main: SSH into the server, pull the new
# commit and rebuild the container from deploy/docker-compose.yml.

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    steps:
      - name: Pull and rebuild
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SSH_PROJECT_PATH }}
            git pull origin main --rebase
            cd deploy
            docker compose up --build -d
