name: Deploy

# Rolls out a release after the CI workflow succeeds on main: SSH into the
# server, check out the exact commit that passed and rebuild the container
# from deploy/docker-compose.yml.

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]

jobs:
    deploy:
        name: Deploy over SSH
        runs-on: ubuntu-latest
        if: github.event.workflow_run.conclusion == 'success'
        steps:
            - name: Pull and rebuild
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      set -e
                      cd ${{ secrets.SSH_PROJECT_PATH }}
                      git fetch origin main
                      git checkout --detach ${{ github.event.workflow_run.head_sha }}
                      cd deploy
                      docker compose up --build -d
